<!DOCTYPE html>
<!--
  Standalone boundary ("box") drag widget. Deploy this whole github_pages/
  folder to GitHub Pages, then this file gets loaded in an <iframe> by the
  Qualtrics bridge script (see ../qualtrics_bridge/boundary_bridge.js).

  Two modes, selected by the "mode" param:

  mode=numeric (scales 5, 6, 10, 100)
    Handles drag continuously across the real scale range, snapped to `step`,
    with a live label above each handle showing its current value.
      min    scale minimum (e.g. 1, or 0 for the 100-pt scale)
      max    scale maximum (e.g. 5, 6, 10, or 100)
      step   snap granularity (0.1 for 5/6/10-pt scales, 1 for the 100-pt scale)
    Example: boundary.html?mode=numeric&min=1&max=5&step=0.1
             boundary.html?mode=numeric&min=0&max=100&step=1

  mode=categorical (scales A-F, Poor-Excellent)
    Dragging itself is fully continuous (glides with the pointer, no
    snapping while moving, so it never feels sticky) -- but the *recorded*
    value snaps to a clean discrete gap (0..n) on release, so "B-" always
    means the exact same number regardless of exactly where in its
    territory the pointer landed, instead of an arbitrary decimal that
    looks meaningful but isn't. Category i occupies the gap-space block
    [i, i+1); negative handle -> that category becomes the last negative
    one (gap = floor(v)+1); positive handle -> that category becomes the
    first positive one (gap = floor(v)). The live label previews exactly
    what release would produce at every instant, so it never disagrees with
    where the handle actually lands.

    Once settled, a handle is drawn centered on its own category's tick
    (not the true gap edge) so it visually lines up with the label below
    it, and the shaded fill is drawn to that same position. Exception: when
    the two handles land on the exact same gap (e.g. neg settles on "B",
    pos on "B+" -- adjacent categories, zero neutral width), recentering is
    skipped and both draw at the true shared gap instead, so they can sit
    close together / touching rather than being forced a full category
    apart; a small (~6px) cosmetic-only nudge keeps the two circles visually
    distinguishable there, since they'd otherwise land on the exact same
    pixel while correctly showing different category names. Either way, the
    *recorded* negVal/posVal sent via postMessage always reflect the true
    gap values, unaffected by any of this -- only where the circles and
    fills are drawn is adjusted for display.
      points  comma-separated point labels, low-to-high, e.g. for grades
              "F,D,C-,C,C+,B-,B,B+,A-,A,A+" (worst to best, left to right)
    Example: boundary.html?mode=categorical&points=F,D,C-,C,C%2B,B-,B,B%2B,A-,A,A%2B

  On every handle release, postMessages the result to the parent window:
    { type: "srx-boundary-result", negVal, posVal, neutralWidth }

  You can open this file directly in a browser (with a query string) to test
  and debug it with normal dev tools -- no Qualtrics involved.
-->
<html>
<head>
<meta charset="utf-8" />
<title>Boundary task</title>
<style>
  body { margin: 0; font-family: system-ui, sans-serif; }
  .srx-boundary-root { max-width: 700px; margin: 20px auto; }
  .srx-track-wrap { position: relative; padding: 44px 10px 24px; }
  .srx-track { position: relative; height: 12px; background: #d8dce0; border-radius: 6px; }
  .srx-fill { position: absolute; top: 0; height: 12px; }
  .srx-fill-neg { left: 0; background: #d9534f; border-radius: 6px 0 0 6px; }
  .srx-fill-pos { right: 0; background: #5cb85c; border-radius: 0 6px 6px 0; }
  .srx-handle {
    position: absolute; top: -8px; width: 28px; height: 28px; margin-left: -14px;
    border-radius: 50%; background: #fff; border: 3px solid #333; cursor: grab; touch-action: none;
  }
  .srx-handle:active { cursor: grabbing; }
  .srx-handle-neg { border-color: #d9534f; }
  .srx-handle-pos { border-color: #5cb85c; }
  /* Cosmetic-only nudge (doesn't touch the underlying value) so two circles
     that settled on the exact same gap -- e.g. negative on "B", positive on
     "B+", a valid zero-neutral-width state -- read as two distinct, nearly-
     touching circles instead of one blob showing contradictory labels. */
  .srx-handle-coincide-neg { margin-left: -20px; }
  .srx-handle-coincide-pos { margin-left: -8px; }
  .srx-value-label {
    position: absolute; top: -30px; font-size: 13px;
    font-weight: 600; padding: 2px 7px; border-radius: 4px; color: #fff;
    white-space: nowrap; pointer-events: none;
  }
  /* Same height, but shifted sideways off the handle's center so the two
     labels don't touch even when both handles land on the same spot. */
  .srx-value-label-neg { background: #d9534f; transform: translateX(calc(-50% - 22px)); }
  .srx-value-label-pos { background: #5cb85c; transform: translateX(calc(-50% + 22px)); }
  /* Categorical labels ("Very Good / Excellent") run longer than numeric
     ones ("3.4"), so give them more sideways clearance. */
  .srx-mode-categorical .srx-value-label-neg { transform: translateX(calc(-50% - 34px)); }
  .srx-mode-categorical .srx-value-label-pos { transform: translateX(calc(-50% + 34px)); }
  .srx-ticks { position: relative; height: 20px; margin-top: 12px; }
  .srx-tick-label { position: absolute; transform: translateX(-50%); font-size: 12px; color: #555; white-space: nowrap; }
  .srx-legend { display: flex; justify-content: center; gap: 24px; margin-top: 10px; font-size: 13px; }
  .srx-legend-neg { color: #d9534f; }
  .srx-legend-neu { color: #777; }
  .srx-legend-pos { color: #5cb85c; }
</style>
</head>
<body>
<div id="srx-boundary-root" class="srx-boundary-root">
  <div class="srx-track-wrap">
    <div id="srx-track" class="srx-track">
      <div id="srx-neg-fill" class="srx-fill srx-fill-neg"></div>
      <div id="srx-pos-fill" class="srx-fill srx-fill-pos"></div>
      <div id="srx-label-neg" class="srx-value-label srx-value-label-neg"></div>
      <div id="srx-label-pos" class="srx-value-label srx-value-label-pos"></div>
      <div id="srx-handle-neg" class="srx-handle srx-handle-neg" tabindex="0" role="slider" aria-label="Negative boundary"></div>
      <div id="srx-handle-pos" class="srx-handle srx-handle-pos" tabindex="0" role="slider" aria-label="Positive boundary"></div>
    </div>
    <div id="srx-ticks" class="srx-ticks"></div>
  </div>
  <div class="srx-legend">
    <span class="srx-legend-item srx-legend-neg">&#9632; Negative</span>
    <span class="srx-legend-item srx-legend-neu">&#9632; Neutral</span>
    <span class="srx-legend-item srx-legend-pos">&#9632; Positive</span>
  </div>
</div>
<script>
(function () {
  var qs = new URLSearchParams(window.location.search);
  var mode       = qs.get("mode") === "categorical" ? "categorical" : "numeric";
  var scaleMin   = parseFloat(qs.get("min"));
  var scaleMax   = parseFloat(qs.get("max"));
  var step       = parseFloat(qs.get("step")) || 1;
  var pointsRaw  = qs.get("points") || "";
  var points     = pointsRaw ? pointsRaw.split(",").filter(Boolean) : [];
  var n          = points.length;

  // Numeric mode: handles drag directly in real scale units (e.g. 1.0-5.0).
  // Categorical mode: edge positions represent the n+1 possible "gaps" a
  // handle can sit in (before point 1, between each pair, after the last
  // point) -- a boundary sits *between* two points, never on one.
  var minEdge, maxEdge;
  if (mode === "numeric") {
    minEdge = scaleMin;
    maxEdge = scaleMax;
  } else {
    minEdge = 0;
    maxEdge = n;
  }

  if (!(maxEdge - minEdge > 0)) {
    document.getElementById("srx-boundary-root").innerHTML =
      "<p style=\"color:#d9534f;font-family:monospace;\">" +
      "No valid scale range in the URL. For a numeric scale pass " +
      "<code>mode=numeric&min=1&max=5&step=0.1</code>; for a categorical scale pass " +
      "<code>mode=categorical&points=A,B,C,D,F</code>.</p>";
    return;
  }

  if (mode === "categorical") {
    document.getElementById("srx-boundary-root").classList.add("srx-mode-categorical");
  }

  var track     = document.getElementById("srx-track");
  var handleNeg = document.getElementById("srx-handle-neg");
  var handlePos = document.getElementById("srx-handle-pos");
  var fillNeg   = document.getElementById("srx-neg-fill");
  var fillPos   = document.getElementById("srx-pos-fill");
  var labelNeg  = document.getElementById("srx-label-neg");
  var labelPos  = document.getElementById("srx-label-pos");
  var ticksWrap = document.getElementById("srx-ticks");

  // Both boxes start collapsed (empty) -- an intentional drag is required to
  // mark anything negative or positive.
  var negVal = minEdge;
  var posVal = maxEdge;

  var stepDecimals = (function () {
    var s = String(step);
    var i = s.indexOf(".");
    return i === -1 ? 0 : s.length - i - 1;
  })();

  function edgeToPct(v) { return ((v - minEdge) / (maxEdge - minEdge)) * 100; }
  function clamp(v) { return Math.max(minEdge, Math.min(maxEdge, v)); }

  function snap(v) {
    var snapped = Math.round(v / step) * step;
    return parseFloat(snapped.toFixed(stepDecimals));
  }

  // Categorical mode: dragging itself is fully continuous (no snapping
  // while moving, so it never feels sticky), but the *recorded* value snaps
  // to a clean discrete gap (0..n) on release -- so "B-" always means the
  // exact same number no matter where in its territory the pointer happened
  // to land, instead of an arbitrary decimal that looks meaningful but
  // isn't. Category i occupies the gap-space block [i, i+1); which category
  // a raw position is currently inside of is its floor. Negative handle ->
  // gap is floor(v)+1 (that category becomes the *last* negative one);
  // positive handle -> gap is floor(v) (that category becomes the *first*
  // positive one). This must stay symmetric with gapToCategoryIndex below.
  function categoricalGap(v, isNeg) {
    if (isNeg) return v <= 0 ? 0 : Math.min(n, Math.floor(v) + 1);
    return v >= n ? n : Math.max(0, Math.floor(v));
  }

  // Converts a settled gap back to the category index it represents for
  // display. Negative and positive handles deliberately keep their own
  // category here even when the two gaps are equal (e.g. neg settled on
  // "B", pos settled on "B+") -- they're genuinely different categories
  // bordering a zero-width neutral zone, not the same choice duplicated, so
  // showing one shared label for both would misrepresent what was set.
  function gapToCategoryIndex(gap, isNeg) {
    if (isNeg) return gap <= 0 ? 0 : gap - 1;
    return gap >= n ? n - 1 : gap;
  }

  // `settled` must be explicit (not inferred from whether v "looks like" an
  // integer): a raw mid-drag position can coincidentally land on an exact
  // integer pixel value, which would otherwise be misread as an
  // already-settled gap and double-processed through categoricalGap.
  function categoryIndex(v, isNeg, settled) {
    var gap = settled ? v : categoricalGap(v, isNeg);
    return gapToCategoryIndex(gap, isNeg);
  }

  function labelText(v, isNeg, settled) {
    return mode === "numeric" ? v.toFixed(stepDecimals) : points[categoryIndex(v, isNeg, settled)];
  }

  function renderTicks() {
    ticksWrap.innerHTML = "";
    if (mode === "numeric") {
      // One tick per whole scale point when the range is small enough to
      // read (5/6/10-pt scales); every 10 for wider ranges (0-100-pt scale).
      var range = maxEdge - minEdge;
      var tickStep = range <= 10 ? 1 : 10;
      var vals = [];
      for (var v = minEdge; v <= maxEdge + 1e-9; v += tickStep) vals.push(Math.round(v));
      vals.forEach(function (v) {
        var el = document.createElement("div");
        el.className = "srx-tick-label";
        el.style.left = edgeToPct(v) + "%";
        el.textContent = v;
        ticksWrap.appendChild(el);
      });
    } else {
      points.forEach(function (label, i) {
        var el = document.createElement("div");
        el.className = "srx-tick-label";
        el.style.left = edgeToPct(i + 0.5) + "%";
        el.textContent = label;
        ticksWrap.appendChild(el);
      });
    }
  }

  // Tracks whether each handle is mid-drag (raw, unsnapped value) or at
  // rest (settled on a discrete gap) -- see categoryIndex.
  var negSettled = true, posSettled = true;

  // Categorical mode only, and only once a handle has *settled*: draw it
  // centered on its own category's tick instead of the true gap edge, so it
  // visually lines up with the label below it. Exception: when the two
  // handles are exactly adjacent (zero neutral width -- e.g. neg settled on
  // "B", pos on "B+"), skip this and use the true shared gap position
  // instead, so they can sit close together / touching rather than being
  // forced a full category apart -- see the small cosmetic nudge in
  // render() that keeps them visually distinguishable there.
  function handleDisplayPos(v, isNeg, settled) {
    if (mode !== "categorical" || !settled) return v;
    if (negVal === posVal) return v;
    if (isNeg) return v <= 0 ? 0 : v - 0.5;
    return v >= n ? n : v + 0.5;
  }

  function render() {
    var negPos = edgeToPct(handleDisplayPos(negVal, true, negSettled));
    var posPos = edgeToPct(handleDisplayPos(posVal, false, posSettled));
    // Fills track wherever the circles are actually drawn -- during a drag
    // that's the raw position, and once settled (non-adjacent case) it's
    // the recentered category tick, so the shaded bar never overshoots
    // past the circle.
    var coincide = mode === "categorical" && negVal === posVal;
    handleNeg.classList.toggle("srx-handle-coincide-neg", coincide);
    handlePos.classList.toggle("srx-handle-coincide-pos", coincide);

    handleNeg.style.left = negPos + "%";
    handlePos.style.left = posPos + "%";
    fillNeg.style.width = negPos + "%";
    fillPos.style.width = (100 - posPos) + "%";

    labelNeg.style.left = negPos + "%";
    labelPos.style.left = posPos + "%";
    labelNeg.textContent = labelText(negVal, true, negSettled);
    labelPos.textContent = labelText(posVal, false, posSettled);
  }

  function pxToVal(clientX) {
    var rect = track.getBoundingClientRect();
    var pct = (clientX - rect.left) / rect.width;
    return clamp(minEdge + pct * (maxEdge - minEdge));
  }

  function post() {
    var msg = { type: "srx-boundary-result", negVal: negVal, posVal: posVal, neutralWidth: posVal - negVal };
    window.parent.postMessage(msg, "*");
  }

  function makeDraggable(handle, isNeg) {
    handle.addEventListener("pointerdown", function (e) {
      handle.setPointerCapture(e.pointerId);
      if (isNeg) { negSettled = false; } else { posSettled = false; }

      function onMove(ev) {
        var raw = pxToVal(ev.clientX);
        var v;
        if (mode === "numeric") {
          // Numeric scales snap to `step` continuously so the live value
          // label stays accurate.
          v = snap(raw);
        } else {
          // Categorical: glide smoothly with the pointer, no snapping while
          // dragging (that's what made it feel sticky). Keep raw strictly
          // on this handle's own side of the other handle's gap so
          // categoricalGap's floor-based rounding can't overshoot past it
          // on release -- without this, raw could land exactly ON the other
          // handle's gap value and round UP past it, which silently
          // prevented the two handles from ever settling adjacent to each
          // other. Staying epsilon below/above still allows the settled gap
          // to land exactly on the other handle's gap (valid, zero neutral
          // width), just never past it.
          var CAT_EPS = 0.001;
          v = isNeg ? Math.min(raw, posVal - CAT_EPS) : Math.max(raw, negVal + CAT_EPS);
        }
        // Handles cannot cross -- the negative box's right edge can never
        // pass the positive box's left edge, and vice versa.
        if (isNeg) { negVal = Math.min(v, posVal); }
        else { posVal = Math.max(v, negVal); }
        render();
      }
      function onUp() {
        handle.removeEventListener("pointermove", onMove);
        handle.removeEventListener("pointerup", onUp);
        if (mode === "categorical") {
          // Snap the *recorded* value to a clean discrete gap now that the
          // drag is done -- so the exported data always reflects a whole
          // category choice, not wherever the pointer happened to land
          // within one. render() then draws the circle centered on that
          // category's tick (see handleDisplayPos) -- grabbing it again for
          // a new drag starts from wherever it's actually drawn, so this
          // doesn't reintroduce a jump.
          if (isNeg) { negVal = Math.min(categoricalGap(negVal, true), posVal); }
          else { posVal = Math.max(categoricalGap(posVal, false), negVal); }
        }
        if (isNeg) { negSettled = true; } else { posSettled = true; }
        render();
        post();
      }
      handle.addEventListener("pointermove", onMove);
      handle.addEventListener("pointerup", onUp);
    });
  }

  renderTicks();
  render();
  post(); // record the default (empty/empty) state immediately on load
  makeDraggable(handleNeg, true);
  makeDraggable(handlePos, false);

  // Let the parent know the iframe finished loading and is ready to receive
  // a resize or other setup, if needed.
  window.parent.postMessage({ type: "srx-boundary-ready" }, "*");
})();
</script>
</body>
</html>
