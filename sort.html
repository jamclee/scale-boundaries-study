<!DOCTYPE html>
<!--
  Standalone drag-into-bins sort widget. Deploy this whole github_pages/
  folder to GitHub Pages, then this file gets loaded in an <iframe> by the
  Qualtrics bridge script (see ../qualtrics_bridge/sort_bridge.js).

  This page is generic on purpose -- it doesn't know about "Stage 1 / Stage
  2" or Qualtrics field names. It's just handed a list of items to sort and
  reports back what the respondent did with them. All the study-specific
  logic (which items to show, where results get saved, the adaptive zoom
  calculation) lives in the Qualtrics bridge script.

  Reads config from URL query params:
    items   comma-separated item labels (e.g. "1,2,3,4,5" or "21,22,23,...,29")

  Example: sort.html?items=1,2,3,4,5

  While sorting, postMessages progress to the parent window:
    { type: "srx-sort-progress", complete: false, assignments: {...} }
  Once every item has been placed in a bin:
    { type: "srx-sort-complete", assignments: { "<item>": "negative|neutral|positive", ... } }

  You can open this file directly in a browser (with a query string) to test
  and debug it with normal dev tools -- no Qualtrics involved.
-->
<html>
<head>
<meta charset="utf-8" />
<title>Sort task</title>
<style>
  body { margin: 0; font-family: system-ui, sans-serif; }
  .srx-sort-root { max-width: 720px; margin: 20px auto; }
  .srx-sort-pool {
    display: flex; flex-wrap: wrap; gap: 8px; min-height: 50px; padding: 10px;
    border: 1px dashed #bbb; border-radius: 8px; margin-bottom: 16px;
  }
  .srx-chip {
    padding: 8px 14px; border: 2px solid #333; border-radius: 20px; background: #f5f5f5;
    cursor: grab; user-select: none; touch-action: none; font-size: 14px;
  }
  .srx-chip.dragging { opacity: 0.4; }
  .srx-bins { display: flex; gap: 12px; }
  .srx-bin { flex: 1; }
  .srx-bin-label { text-align: center; font-weight: 600; margin-bottom: 6px; }
  .srx-bin-neg { color: #d9534f; }
  .srx-bin-neu { color: #777; }
  .srx-bin-pos { color: #5cb85c; }
  .srx-bin-drop {
    min-height: 120px; border: 2px solid #ccc; border-radius: 8px; padding: 8px;
    display: flex; flex-wrap: wrap; gap: 8px; align-content: flex-start;
  }
  .srx-bin-drop.dragover { border-color: #337ab7; background: #eef5fc; }
</style>
</head>
<body>
<div id="srx-sort-root" class="srx-sort-root">
  <div id="srx-sort-pool" class="srx-sort-pool"></div>
  <div class="srx-bins">
    <div class="srx-bin" data-bin="negative">
      <div class="srx-bin-label srx-bin-neg">Negative</div>
      <div class="srx-bin-drop" id="srx-bin-negative"></div>
    </div>
    <div class="srx-bin" data-bin="neutral">
      <div class="srx-bin-label srx-bin-neu">Neutral</div>
      <div class="srx-bin-drop" id="srx-bin-neutral"></div>
    </div>
    <div class="srx-bin" data-bin="positive">
      <div class="srx-bin-label srx-bin-pos">Positive</div>
      <div class="srx-bin-drop" id="srx-bin-positive"></div>
    </div>
  </div>
</div>
<script>
(function () {
  var qs = new URLSearchParams(window.location.search);
  var itemsRaw = qs.get("items") || "";
  var items = itemsRaw
    ? itemsRaw.split(",").map(function (s) { return s.trim(); }).filter(Boolean)
    : [];

  var root = document.getElementById("srx-sort-root");
  var pool = document.getElementById("srx-sort-pool");
  var bins = {
    negative: document.getElementById("srx-bin-negative"),
    neutral:  document.getElementById("srx-bin-neutral"),
    positive: document.getElementById("srx-bin-positive")
  };
  var assignment = {}; // item label -> bin name | null (still in pool)

  if (items.length === 0) {
    root.innerHTML = "<p><em>No items to sort.</em></p>";
    window.parent.postMessage({ type: "srx-sort-complete", assignments: {} }, "*");
    return;
  }

  function makeChip(label) {
    var chip = document.createElement("div");
    chip.className = "srx-chip";
    chip.textContent = label;
    chip.dataset.item = label;
    chip.setAttribute("tabindex", "0");
    attachDrag(chip);
    return chip;
  }

  items.forEach(function (label) {
    assignment[label] = null;
    pool.appendChild(makeChip(label));
  });

  function allDropEls() { return [pool, bins.negative, bins.neutral, bins.positive]; }

  function attachDrag(chip) {
    chip.addEventListener("pointerdown", function (e) {
      chip.setPointerCapture(e.pointerId);
      chip.classList.add("dragging");

      function onMove(ev) {
        allDropEls().forEach(function (b) { b.classList.remove("dragover"); });
        var el = document.elementFromPoint(ev.clientX, ev.clientY);
        var target = el && el.closest(".srx-bin-drop, .srx-sort-pool");
        if (target) target.classList.add("dragover");
      }

      function onUp(ev) {
        chip.classList.remove("dragging");
        allDropEls().forEach(function (b) { b.classList.remove("dragover"); });
        var el = document.elementFromPoint(ev.clientX, ev.clientY);
        var target = el && el.closest(".srx-bin-drop, .srx-sort-pool");
        if (target) {
          target.appendChild(chip);
          assignment[chip.dataset.item] =
            target.id === "srx-sort-pool" ? null : target.id.replace("srx-bin-", "");
        }
        chip.removeEventListener("pointermove", onMove);
        chip.removeEventListener("pointerup", onUp);
        report();
      }

      chip.addEventListener("pointermove", onMove);
      chip.addEventListener("pointerup", onUp);
    });
  }

  function report() {
    var allSorted = items.every(function (label) { return assignment[label]; });
    var msg = {
      type: allSorted ? "srx-sort-complete" : "srx-sort-progress",
      complete: allSorted,
      assignments: assignment
    };
    window.parent.postMessage(msg, "*");
  }

  window.parent.postMessage({ type: "srx-sort-ready" }, "*");
  report(); // initial state: nothing sorted
})();
</script>
</body>
</html>
